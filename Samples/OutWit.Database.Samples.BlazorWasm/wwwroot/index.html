<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WitDatabase Blazor WASM Sample</title>
    <base href="/" />
    
    <!-- MudBlazor CSS -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="css/app.css" />
</head>

<body>
    <div id="app">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#f5f5f5">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
            <p style="margin-top:20px;color:#666">Loading WitDatabase Blazor WASM...</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- WitDatabase IndexedDB JavaScript -->
    <script src="_content/OutWit.Database.Core.IndexedDb/witdb-indexeddb.js"></script>
    <script src="_content/OutWit.Database.Core.IndexedDb/witdb-indexeddb-index.js"></script>
    
    <!-- MudBlazor JS -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
