name: Release WitDatabase Studio

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave empty to use version from project, e.g., v1.0.0)'
        required: false
        type: string
      releaseName:
        description: 'Release title (leave empty to use "WitDatabase Studio vX.X.X")'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        required: false
        default: false
      buildWindows:
        description: 'Build for Windows (x64)'
        type: boolean
        required: false
        default: true
      buildLinux:
        description: 'Build for Linux (x64)'
        type: boolean
        required: false
        default: true
      buildMacOS:
        description: 'Build for macOS (x64) - may have issues with AspectInjector'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}
      releaseName: ${{ steps.get-version.outputs.releaseName }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from project
        id: get-version
        shell: bash
        run: |
          # Extract version from csproj
          version=$(grep -oP '(?<=<Version>)[^<]+' Tools/OutWit.Database.Studio/OutWit.Database.Studio.csproj | head -1)
          echo "Project version: $version"
          
          # Use input tag or generate from version
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="v${version}"
          fi
          echo "Tag: $tag"
          
          # Use input release name or generate from version
          if [ -n "${{ github.event.inputs.releaseName }}" ]; then
            releaseName="${{ github.event.inputs.releaseName }}"
          else
            releaseName="WitDatabase Studio ${tag}"
          fi
          echo "Release name: $releaseName"
          
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "releaseName=$releaseName" >> $GITHUB_OUTPUT

      - name: Set build matrix
        id: set-matrix
        shell: bash
        run: |
          matrix='{"include":['
          first=true
          
          if [ "${{ github.event.inputs.buildWindows }}" == "true" ]; then
            matrix+='{"os":"windows-latest","rid":"win-x64","artifact":"WitDatabase.Studio-win-x64"}'
            first=false
          fi
          
          if [ "${{ github.event.inputs.buildLinux }}" == "true" ]; then
            if [ "$first" == "false" ]; then matrix+=','; fi
            matrix+='{"os":"ubuntu-latest","rid":"linux-x64","artifact":"WitDatabase.Studio-linux-x64"}'
            first=false
          fi
          
          if [ "${{ github.event.inputs.buildMacOS }}" == "true" ]; then
            if [ "$first" == "false" ]; then matrix+=','; fi
            matrix+='{"os":"macos-latest","rid":"osx-x64","artifact":"WitDatabase.Studio-osx-x64"}'
          fi
          
          matrix+=']}'
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Build matrix: $matrix"

  build:
    name: Build ${{ matrix.os }}
    needs: prepare
    if: ${{ github.event.inputs.buildWindows == 'true' || github.event.inputs.buildLinux == 'true' || github.event.inputs.buildMacOS == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Tools/OutWit.Database.Studio/OutWit.Database.Studio.csproj --runtime ${{ matrix.rid }}

      - name: Publish self-contained
        run: >
          dotnet publish Tools/OutWit.Database.Studio/OutWit.Database.Studio.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=false
          -p:PublishTrimmed=false
          -p:GeneratePackageOnBuild=false
          --output ./publish/${{ matrix.artifact }}

      - name: List published files
        run: |
          echo "Published files:"
          ls -la ./publish/${{ matrix.artifact }}/

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/${{ matrix.artifact }}/* -DestinationPath ./${{ matrix.artifact }}.zip

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd ./publish/${{ matrix.artifact }}
          tar -czvf ../../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ./${{ matrix.artifact }}.zip
            ./${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find ./artifacts -type f | head -20

      - name: Collect release files
        id: collect
        run: |
          mkdir -p release-files
          find ./artifacts -name "*.zip" -exec cp {} release-files/ \;
          find ./artifacts -name "*.tar.gz" -exec cp {} release-files/ \;
          echo "Release files:"
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.releaseName }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          files: release-files/*
          generate_release_notes: true
