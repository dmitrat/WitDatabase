name: Publish Package
run-name: "Publish Package: ${{ inputs.project }}"

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to publish (equals .csproj base name)'
        required: true
        type: choice
        options:
          - OutWit.Database.Core
          - OutWit.Database.Core.BouncyCastle
          - OutWit.Database.Core.IndexedDb
          - OutWit.Database.Parser
          - OutWit.Database
          - OutWit.Database.AdoNet
          - OutWit.Database.EntityFramework
      pushToNuGet:
        description: 'Push to nuget.org'
        type: boolean
        required: true
        default: true
      pushToGitHubPackages:
        description: 'Push to GitHub Packages'
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PROJECT: ${{ github.event.inputs.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (required for ANTLR4)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET SDKs (9/10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.slnx', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Resolve project path
        id: paths
        shell: bash
        run: |
          name="${{ env.PROJECT }}"
          lib=$(find . -name "$name.csproj" -type f | head -1)
          if [ -z "$lib" ]; then
            echo "Library project '$name.csproj' not found"
            exit 1
          fi
          echo "libCsproj=$lib" >> $GITHUB_OUTPUT
          echo "Resolved: $lib"

      - name: Build (all target frameworks)
        run: dotnet build "${{ steps.paths.outputs.libCsproj }}" -c Release -p:ContinuousIntegrationBuild=true

      - name: Pack (no build)
        run: dotnet pack "${{ steps.paths.outputs.libCsproj }}" -c Release --no-build

      - name: Collect packages
        id: collect
        shell: bash
        run: |
          mkdir -p NuGet
          find . -path "*/bin/Release/*.nupkg" -exec cp {} NuGet/ \;
          find . -path "*/bin/Release/*.snupkg" -exec cp {} NuGet/ \;
          
          hasNupkg=$(ls NuGet/*.nupkg 2>/dev/null | wc -l)
          hasSnupkg=$(ls NuGet/*.snupkg 2>/dev/null | wc -l)
          
          echo "hasNupkg=$([[ $hasNupkg -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "hasSnupkg=$([[ $hasSnupkg -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          
          echo "Collected packages:"
          ls -la NuGet/

      - name: Add GitHub Packages source
        if: github.event.inputs.pushToGitHubPackages == 'true'
        run: >
          dotnet nuget add source
          --username ${{ github.actor }}
          --password ${{ secrets.GITHUB_TOKEN }}
          --store-password-in-clear-text
          --name github
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Push to nuget.org (.nupkg)
        if: github.event.inputs.pushToNuGet == 'true' && steps.collect.outputs.hasNupkg == 'true'
        run: >
          dotnet nuget push "NuGet/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to nuget.org (.snupkg)
        if: github.event.inputs.pushToNuGet == 'true' && steps.collect.outputs.hasSnupkg == 'true'
        run: >
          dotnet nuget push "NuGet/*.snupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push to GitHub Packages (.nupkg)
        if: github.event.inputs.pushToGitHubPackages == 'true' && steps.collect.outputs.hasNupkg == 'true'
        run: >
          dotnet nuget push "NuGet/*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source github
          --skip-duplicate

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT }}-nuget
          path: NuGet/*
          retention-days: 7
